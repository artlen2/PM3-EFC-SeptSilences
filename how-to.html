<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sept Silences - Navigation</title>
    <link rel="stylesheet" href="style.css" />
    <script src="./assets/scripts/audio-manager.js" defer></script>
  </head>
  <body class="min-h-screen flex justify-center items-center">
    <!-- Le fond d'écran -->
    <video
      autoplay
      muted
      loop
      playsinline
      class="fixed top-0 left-0 w-full h-full object-cover -z-10"
    >
      <source src="videos/BgAccueil.mp4" type="video/mp4" />
      La vidéo n'est pas supporté par votre logiciel.
    </video>
    <!-- Page Comment naviguer -->
    <nav
      class="flex flex-row absolute top-0 items-center text-cream w-full pt-5 px-5 h-1/10"
    >
      <div class="flex flex-col w-1/2 gap-4 relative z-1 h-full items-start">
        <a href="index.html" class="h-full"
          ><img
            src="images/logoshadow.png"
            alt="Logo Sept Silences"
            class="h-full"
        /></a>
      </div>
      <div class="flex flex-row relative w-1/2 gap-4 items-end">
        <a
          href="index.html"
          class="btn-menu-nav"
          style="
            background-image: url(&quot;../../images/boutoncropped.png&quot;);
          "
          >Accueil</a
        >
        <a
          href="how-to.html"
          class="btn-menu-nav"
          style="
            background-image: url(&quot;../../images/boutoncropped.png&quot;);
          "
          >Comment naviguer</a
        >
        <a
          href="about.html"
          class="btn-menu-nav"
          style="
            background-image: url(&quot;../../images/boutoncropped.png&quot;);
          "
          >À propos</a
        >
        <a
          href="game.html"
          class="btn-menu-nav"
          style="
            background-image: url(&quot;../../images/boutoncropped.png&quot;);
          "
          >Lancer l'expérience</a
        >
      </div>
    </nav>

    <!-- Contenu -->
    <div class="w-8/10 h-full text-center text-ink gap-10 flex flex-col">
      <h3 class="text-5xl">Comment naviguer</h3>
      <!-- hehe -->
      <div
        class="bg-red-bg text-cream rounded-xl p-15 h-full text-left w-full text-2xl flex flex-col gap-5"
      >
        <p>
          Lorsque les touches apparaissent à l'écran, veuillez interagir avec
          les objectifs qui correspondent à ceux-ci.
        </p>
        <p>T — Répondre au tléphone</p>
        <p>C — Faire un café</p>
        <p>D — Prendre une douche</p>
        <p>L — Consulter votre carnet de tâches</p>
      </div>
    </div>
  </body>
</html>
